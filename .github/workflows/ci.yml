name: TalentIQ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-scorer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/scorer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -v

  test-scraper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install fastapi uvicorn asyncpg pydantic python-dotenv httpx beautifulsoup4 fake-useragent tenacity anthropic playwright pytest
      - run: pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check workers/ --ignore E501,F401
