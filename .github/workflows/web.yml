name: Web App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check & Lint
        run: npm run lint --workspace=apps/web
      - name: Build
        run: npm run build --workspace=apps/web
      - name: Deploy to Vercel
        # TODO: Add vercel CLI step with secrets in Phase 25
        run: echo "Vercel deploy stubbed"
